<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>动物园专用账本</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f5f5f5; color: #333; max-width: 480px; margin: 0 auto; min-height: 100vh; }
  .nav { display: flex; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
  .nav-btn { flex: 1; padding: 14px 0; text-align: center; font-size: 14px; color: #999; cursor: pointer; border: none; background: none; }
  .nav-btn.active { color: #07c160; font-weight: 600; border-bottom: 2px solid #07c160; }
  .page { display: none; padding: 16px; }
  .page.active { display: block; }
  .animal-banner { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .animal-banner svg { width: 100%; height: 110px; }
  .balance-card { background: linear-gradient(135deg, #07c160, #06ad56); border-radius: 16px; padding: 24px; color: #fff; margin-bottom: 16px; }
  .balance-label { font-size: 13px; opacity: .85; margin-bottom: 6px; }
  .balance-amount { font-size: 36px; font-weight: 700; margin-bottom: 16px; }
  .balance-row { display: flex; gap: 16px; }
  .balance-item { flex: 1; background: rgba(255,255,255,.15); border-radius: 10px; padding: 10px 14px; }
  .balance-item .label { font-size: 12px; opacity: .85; margin-bottom: 4px; }
  .balance-item .val { font-size: 18px; font-weight: 600; }
  .section-title { font-size: 14px; color: #999; margin: 16px 0 8px; }
  .record-list { background: #fff; border-radius: 12px; overflow: hidden; }
  .record-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #f5f5f5; }
  .record-item:last-child { border-bottom: none; }
  .record-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; flex-shrink: 0; }
  .record-icon.income { background: #e8f8ef; }
  .record-icon.expense { background: #fff0f0; }
  .record-info { flex: 1; min-width: 0; }
  .record-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .record-date { font-size: 12px; color: #999; margin-top: 2px; }
  .record-amount { font-size: 16px; font-weight: 600; flex-shrink: 0; }
  .record-amount.income { color: #07c160; }
  .record-amount.expense { color: #ff4444; }
  .empty { text-align: center; padding: 40px 0; color: #bbb; font-size: 14px; }
  .type-tabs { display: flex; background: #fff; border-radius: 12px; padding: 4px; margin-bottom: 16px; }
  .type-tab { flex: 1; padding: 10px; text-align: center; border-radius: 9px; font-size: 15px; cursor: pointer; color: #999; }
  .type-tab.active.income { background: #e8f8ef; color: #07c160; font-weight: 600; }
  .type-tab.active.expense { background: #fff0f0; color: #ff4444; font-weight: 600; }
  .form-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .form-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
  .form-row:last-child { border-bottom: none; }
  .form-label { font-size: 14px; color: #666; width: 70px; flex-shrink: 0; }
  .form-input { flex: 1; border: none; outline: none; font-size: 15px; text-align: right; background: transparent; color: #333; }
  .form-input::placeholder { color: #ccc; }
  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; flex: 1; }
  .cat-btn { padding: 8px; text-align: center; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid #eee; background: #fafafa; color: #666; }
  .cat-btn.active { border-color: #07c160; background: #e8f8ef; color: #07c160; font-weight: 600; }
  .cat-btn.active.expense-cat { border-color: #ff4444; background: #fff0f0; color: #ff4444; }
  .submit-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .submit-btn.income { background: #07c160; color: #fff; }
  .submit-btn.expense { background: #ff4444; color: #fff; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid #eee; background: #fff; color: #666; white-space: nowrap; flex-shrink: 0; }
  .filter-btn.active { background: #07c160; color: #fff; border-color: #07c160; }
  .month-summary { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; }
  .ms-item { text-align: center; }
  .ms-label { font-size: 12px; color: #999; margin-bottom: 4px; }
  .ms-val { font-size: 16px; font-weight: 600; }
  .ms-val.income { color: #07c160; }
  .ms-val.expense { color: #ff4444; }
  .day-group { margin-bottom: 8px; }
  .day-label { font-size: 12px; color: #999; padding: 4px 0 6px; }
  .del-btn { background: #ff4444; color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; margin-left: 10px; flex-shrink: 0; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.7); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; pointer-events: none; opacity: 0; transition: opacity .3s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<nav class="nav">
  <button class="nav-btn active" onclick="switchPage('home')">🏠 概览</button>
  <button class="nav-btn" onclick="switchPage('add')">➕ 记一笔</button>
  <button class="nav-btn" onclick="switchPage('list')">📋 流水</button>
</nav>
<div id="page-home" class="page active">
  <div class="animal-banner">
    <svg viewBox="0 0 320 115" xmlns="http://www.w3.org/2000/svg">
      <rect width="320" height="115" fill="#f0f9f0" rx="12"/>
      <!-- 地面 -->
      <ellipse cx="160" cy="118" rx="175" ry="28" fill="#c8efc8"/>

      <!-- 羊（左侧，面朝右） -->
      <g id="sheep">
        <!-- 身体绒毛 -->
        <circle cx="62" cy="76" r="16" fill="white" stroke="#ddd" stroke-width="1"/>
        <circle cx="76" cy="72" r="14" fill="white" stroke="#ddd" stroke-width="1"/>
        <circle cx="54" cy="70" r="13" fill="white" stroke="#ddd" stroke-width="1"/>
        <circle cx="68" cy="65" r="13" fill="white" stroke="#ddd" stroke-width="1"/>
        <!-- 头 -->
        <ellipse cx="88" cy="68" rx="11" ry="10" fill="#f0ede0" stroke="#ccc" stroke-width="1"/>
        <!-- 耳朵 -->
        <ellipse cx="82" cy="60" rx="4" ry="6" fill="#f5c8c8" stroke="#ccc" stroke-width="1" transform="rotate(-20 82 60)"/>
        <ellipse cx="96" cy="60" rx="4" ry="6" fill="#f5c8c8" stroke="#ccc" stroke-width="1" transform="rotate(20 96 60)"/>
        <!-- 眼睛 -->
        <circle cx="85" cy="67" r="2" fill="#333"/>
        <circle cx="93" cy="67" r="2" fill="#333"/>
        <!-- 鼻子 -->
        <ellipse cx="89" cy="72" rx="3" ry="2" fill="#f0b0b0"/>
        <!-- 腿 -->
        <rect x="53" y="88" width="6" height="14" rx="3" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
        <rect x="65" y="88" width="6" height="14" rx="3" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
        <!-- 项圈 -->
        <ellipse cx="89" cy="76" rx="7" ry="3" fill="none" stroke="#e07030" stroke-width="2"/>
      </g>

      <!-- 狗（右侧，面朝左） -->
      <g id="dog">
        <!-- 身体 -->
        <ellipse cx="252" cy="78" rx="24" ry="16" fill="#D2A679" stroke="#b8935a" stroke-width="1"/>
        <!-- 尾巴 -->
        <path d="M274 70 Q288 58 285 50" stroke="#D2A679" stroke-width="5" fill="none" stroke-linecap="round"/>
        <!-- 头 -->
        <ellipse cx="232" cy="66" rx="15" ry="13" fill="#D2A679" stroke="#b8935a" stroke-width="1"/>
        <!-- 耳朵（垂耳） -->
        <ellipse cx="222" cy="63" rx="6" ry="11" fill="#b8835a" stroke="#a07040" stroke-width="1" transform="rotate(-10 222 63)"/>
        <ellipse cx="242" cy="61" rx="6" ry="11" fill="#b8835a" stroke="#a07040" stroke-width="1" transform="rotate(10 242 61)"/>
        <!-- 眼睛 -->
        <circle cx="227" cy="63" r="3" fill="#3a2010"/>
        <circle cx="238" cy="63" r="3" fill="#3a2010"/>
        <!-- 鼻子 -->
        <ellipse cx="228" cy="70" rx="4" ry="3" fill="#3a2010"/>
        <!-- 腿 -->
        <rect x="238" y="90" width="7" height="13" rx="3.5" fill="#c09060" stroke="#b8935a" stroke-width="1"/>
        <rect x="254" y="90" width="7" height="13" rx="3.5" fill="#c09060" stroke="#b8935a" stroke-width="1"/>
        <!-- 项圈 -->
        <ellipse cx="232" cy="76" rx="7" ry="3" fill="none" stroke="#3070e0" stroke-width="2"/>
      </g>

      <!-- 绳子 -->
      <path d="M 144,52 Q 118,58 96,74" stroke="#8B6340" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="none"/>
      <path d="M 176,52 Q 202,58 225,74" stroke="#8B6340" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- 人（中间） -->
      <g id="person">
        <!-- 头 -->
        <circle cx="160" cy="28" r="13" fill="#FDDBB4" stroke="#e8c090" stroke-width="1"/>
        <!-- 头发 -->
        <path d="M148 24 Q150 14 160 13 Q170 14 172 24" fill="#5a3820" stroke="none"/>
        <!-- 眼睛 -->
        <circle cx="155" cy="27" r="2" fill="#333"/>
        <circle cx="165" cy="27" r="2" fill="#333"/>
        <!-- 嘴（微笑） -->
        <path d="M155 33 Q160 37 165 33" stroke="#c08060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- 身体 -->
        <rect x="150" y="42" width="20" height="24" rx="6" fill="#5b8dd9"/>
        <!-- 左臂（伸向左，牵绳） -->
        <line x1="150" y1="50" x2="118" y2="58" stroke="#FDDBB4" stroke-width="7" stroke-linecap="round"/>
        <!-- 右臂（伸向右，牵绳） -->
        <line x1="170" y1="50" x2="202" y2="58" stroke="#FDDBB4" stroke-width="7" stroke-linecap="round"/>
        <!-- 左手 -->
        <circle cx="116" cy="59" r="5" fill="#FDDBB4" stroke="#e8c090" stroke-width="1"/>
        <!-- 右手 -->
        <circle cx="204" cy="59" r="5" fill="#FDDBB4" stroke="#e8c090" stroke-width="1"/>
        <!-- 腿 -->
        <rect x="151" y="65" width="8" height="18" rx="4" fill="#3a5fa8"/>
        <rect x="161" y="65" width="8" height="18" rx="4" fill="#3a5fa8"/>
        <!-- 鞋 -->
        <ellipse cx="155" cy="83" rx="7" ry="4" fill="#333"/>
        <ellipse cx="165" cy="83" rx="7" ry="4" fill="#333"/>
      </g>

      <text x="160" y="110" text-anchor="middle" font-size="11" fill="#6a9a6a" font-family="PingFang SC, sans-serif" font-weight="500">动物园专用账本</text>
    </svg>
  </div>
  <div class="balance-card">
    <div class="balance-label">当前余额</div>
    <div class="balance-amount" id="total-balance">¥0.00</div>
    <div class="balance-row">
      <div class="balance-item"><div class="label">本月收入</div><div class="val" id="month-income">¥0</div></div>
      <div class="balance-item"><div class="label">本月支出</div><div class="val" id="month-expense">¥0</div></div>
    </div>
  </div>
  <div class="section-title">最近记录</div>
  <div class="record-list" id="recent-list"><div class="empty">加载中...</div></div>
</div>
<div id="page-add" class="page">
  <div class="type-tabs">
    <div class="type-tab active income" id="tab-income" onclick="switchType('income')">💰 收入</div>
    <div class="type-tab expense" id="tab-expense" onclick="switchType('expense')">💸 支出</div>
  </div>
  <div class="form-card">
    <div class="form-row"><span class="form-label">金额</span><input class="form-input" id="input-amount" type="number" placeholder="0.00" inputmode="decimal"></div>
    <div class="form-row"><span class="form-label">备注</span><input class="form-input" id="input-note" type="text" placeholder="卖了什么 / 备注"></div>
    <div class="form-row"><span class="form-label">分类</span><div class="cat-grid" id="cat-grid"></div></div>
    <div class="form-row"><span class="form-label">日期</span><input class="form-input" id="input-date" type="date"></div>
  </div>
  <button class="submit-btn income" id="submit-btn" onclick="submitRecord()">记录收入</button>
</div>
<div id="page-list" class="page">
  <div class="filter-row" id="month-filter"></div>
  <div class="month-summary">
    <div class="ms-item"><div class="ms-label">收入</div><div class="ms-val income" id="list-income">¥0</div></div>
    <div class="ms-item"><div class="ms-label">支出</div><div class="ms-val expense" id="list-expense">¥0</div></div>
    <div class="ms-item"><div class="ms-label">结余</div><div class="ms-val" id="list-balance">¥0</div></div>
  </div>
  <div id="list-content"><div class="empty">加载中...</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL = 'https://hqtpatpjwefiymtmufec.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxdHBhdHBqd2VmaXltdG11ZmVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNDg0NzUsImV4cCI6MjA4OTgyNDQ3NX0.VIfw5k-eOnJeBImwAfkh5L8KrHVwaqv2QyI1d5Vv6lI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let records=[], currentType='income', currentFilter='';
const incomeCategories=['销售','退款返还','其他收入'];
const expenseCategories=['分赃','团建','采购','运费','其他'];

async function fetchRecords(){
  const {data,error}=await sb.from('records').select('*').order('id',{ascending:false});
  if(error){console.error(error);return;}
  records=data||[];
}
function fmtAmt(n){return '¥'+Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fmtAmtShort(n){return '¥'+(n>=10000?(n/10000).toFixed(1)+'万':Number(n).toFixed(0));}
function today(){return new Date().toISOString().slice(0,10);}
function thisMonth(){return new Date().toISOString().slice(0,7);}
function fmtDate(s){const d=new Date(s+'T00:00:00');return (d.getMonth()+1)+'月'+d.getDate()+'日';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function switchPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-btn')[{home:0,add:1,list:2}[page]].classList.add('active');
  if(page==='home')renderHome();
  if(page==='list')renderList();
}
async function renderHome(){
  await fetchRecords();
  const mo=thisMonth();let bal=0,mI=0,mE=0;
  records.forEach(r=>{
    if(r.type==='income')bal+=Number(r.amount);else bal-=Number(r.amount);
    if(r.date&&r.date.startsWith(mo)){if(r.type==='income')mI+=Number(r.amount);else mE+=Number(r.amount);}
  });
  document.getElementById('total-balance').textContent=fmtAmt(bal);
  document.getElementById('month-income').textContent=fmtAmtShort(mI);
  document.getElementById('month-expense').textContent=fmtAmtShort(mE);
  const recent=records.slice(0,10);
  const el=document.getElementById('recent-list');
  el.innerHTML=recent.length?recent.map(r=>recordHTML(r,false)).join(''):'<div class="empty">还没有记录，去记一笔吧 😊</div>';
}
function recordHTML(r,showDel){
  const isI=r.type==='income';
  const icon=isI?'💰':(r.category==='分赃'?'🎉':r.category==='团建'?'🍻':'💸');
  const del=showDel?'<button class="del-btn" onclick="deleteRecord('+r.id+')">删除</button>':'';
  return '<div class="record-item"><div class="record-icon '+r.type+'">'+icon+'</div><div class="record-info"><div class="record-name">'+(r.note||r.category)+'</div><div class="record-date">'+fmtDate(r.date)+(r.category?' · '+r.category:'')+'</div></div><div class="record-amount '+r.type+'">'+(isI?'+':'-')+fmtAmt(r.amount)+'</div>'+del+'</div>';
}
function switchType(type){
  currentType=type;
  document.getElementById('tab-income').className='type-tab'+(type==='income'?' active income':'');
  document.getElementById('tab-expense').className='type-tab'+(type==='expense'?' active expense':'');
  const btn=document.getElementById('submit-btn');
  btn.className='submit-btn '+type;
  btn.textContent=type==='income'?'记录收入':'记录支出';
  renderCats();
}
let selectedCat='';
function renderCats(){
  const cats=currentType==='income'?incomeCategories:expenseCategories;
  selectedCat=cats[0];
  document.getElementById('cat-grid').innerHTML=cats.map(c=>'<div class="cat-btn '+(c===selectedCat?'active'+(currentType==='expense'?' expense-cat':''):'')+'" onclick="selectCat(\''+c+'\')">'+c+'</div>').join('');
}
function selectCat(cat){
  selectedCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>{b.className='cat-btn'+(b.textContent===cat?' active'+(currentType==='expense'?' expense-cat':''):'');});
}
async function submitRecord(){
  const amount=parseFloat(document.getElementById('input-amount').value);
  const note=document.getElementById('input-note').value.trim();
  const date=document.getElementById('input-date').value||today();
  if(!amount||amount<=0){showToast('请输入金额');return;}
  const btn=document.getElementById('submit-btn');btn.disabled=true;
  const {error}=await sb.from('records').insert({type:currentType,amount,note,category:selectedCat,date});
  if(error){showToast('保存失败: '+error.message);}
  else{
    document.getElementById('input-amount').value='';
    document.getElementById('input-note').value='';
    showToast(currentType==='income'?'收入已记录 ✅':'支出已记录 ✅');
  }
  btn.disabled=false;
}
async function renderList(){
  await fetchRecords();
  const months=[...new Set(records.map(r=>r.date&&r.date.slice(0,7)).filter(Boolean))].sort().reverse();
  if(!months.length)currentFilter='';
  else if(!currentFilter||!months.includes(currentFilter))currentFilter=months[0];
  document.getElementById('month-filter').innerHTML=months.map(m=>'<div class="filter-btn '+(m===currentFilter?'active':'')+'" onclick="setFilter(\''+m+'\')">'+m.replace('-','年')+'月</div>').join('');
  renderListContent();
}
function setFilter(m){currentFilter=m;renderList();}
function renderListContent(){
  const filtered=records.filter(r=>!currentFilter||(r.date&&r.date.startsWith(currentFilter)));
  let inc=0,exp=0;
  filtered.forEach(r=>{if(r.type==='income')inc+=Number(r.amount);else exp+=Number(r.amount);});
  document.getElementById('list-income').textContent=fmtAmt(inc);
  document.getElementById('list-expense').textContent=fmtAmt(exp);
  document.getElementById('list-balance').textContent=fmtAmt(inc-exp);
  const el=document.getElementById('list-content');
  if(!filtered.length){el.innerHTML='<div class="empty">这个月还没有记录</div>';return;}
  const groups={};
  filtered.forEach(r=>{if(!groups[r.date])groups[r.date]=[];groups[r.date].push(r);});
  el.innerHTML=Object.keys(groups).sort().reverse().map(date=>'<div class="day-group"><div class="day-label">'+fmtDate(date)+'</div><div class="record-list">'+groups[date].map(r=>recordHTML(r,true)).join('')+'</div></div>').join('');
}
async function deleteRecord(id){
  if(!confirm('确认删除？'))return;
  await sb.from('records').delete().eq('id',id);
  showToast('已删除');
  renderList();
}
document.getElementById('input-date').value=today();
renderCats();
renderHome();
</script>
</body>
</html>
